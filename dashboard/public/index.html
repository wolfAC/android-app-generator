<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TWA Generator — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/assets/app.css" />
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { width: 100%; max-width: 480px; }
    .auth-header { background: #1a1a2e; color: #fff; border-radius: 8px 8px 0 0; padding: 28px 32px 20px; text-align: center; }
    .auth-header h1 { font-size: 1.6rem; font-weight: 700; margin: 0; }
    .auth-header p { margin: 4px 0 0; opacity: 0.7; font-size: 0.9rem; }
    .auth-body { background: #fff; border-radius: 0 0 8px 8px; padding: 28px 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .nav-tabs .nav-link { color: #495057; }
    .nav-tabs .nav-link.active { color: #1a1a2e; font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-header">
      <h1>&#9881; TWA Generator</h1>
      <p>Build Android apps from your web app</p>
    </div>
    <div class="auth-body">
      <ul class="nav nav-tabs mb-4" id="authTabs">
        <li class="nav-item">
          <button class="nav-link active" data-tab="login">Login</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-tab="register">Register</button>
        </li>
      </ul>

      <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>
      <div id="successAlert" class="alert alert-success d-none" role="alert"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="loginPassword" class="form-control" placeholder="Your password" required />
        </div>
        <button type="submit" class="btn btn-primary w-100" id="loginBtn">Login</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="d-none">
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="regPassword" class="form-control" placeholder="Min 8 characters" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="regPasswordConfirm" class="form-control" placeholder="Repeat password" required />
        </div>
        <button type="submit" class="btn btn-success w-100" id="registerBtn">Create Account</button>
      </form>
    </div>
  </div>

  <script src="/assets/auth.js"></script>
</body>
</html>
